// Single-pass syntax highlighter — tokenizes first, then colors each token.
// Never corrupts its own output because spans are only added to final tokens.
function hl(code) {
  if (!code) return "";
  const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const lines = code.split("\n");
  return lines.map(line => {
    // Comments
    if (line.trim().startsWith("//")) return '<span class="hl-cm">' + esc(line) + '</span>';
    // Tokenize: strings, then words, then symbols
    const tokens = [];
    let remaining = line;
    // Extract quoted strings first
    const parts = remaining.split(/(["'][^"']*["'])/g);
    for (let i = 0; i < parts.length; i++) {
      const p = parts[i];
      if (!p) continue;
      if ((p.startsWith('"') || p.startsWith("'")) && (p.endsWith('"') || p.endsWith("'"))) {
        tokens.push('<span class="hl-st">' + esc(p) + '</span>');
      } else {
        // Split remaining into words and non-words
        const words = p.split(/(\b[\w.]+\b)/g);
        for (const w of words) {
          if (!w) continue;
          if (/^(AND|OR|NOT|BY)$/.test(w)) {
            tokens.push('<span class="hl-kw">' + esc(w) + '</span>');
          } else if (/^(IN|NOT IN)$/i.test(w)) {
            tokens.push('<span class="hl-kw">' + esc(w) + '</span>');
          } else if (/^(contains:anycase|in:anycase|in:matchcase|contains|matches|startsWith|endsWith|RegExp)$/.test(w)) {
            tokens.push('<span class="hl-op">' + esc(w) + '</span>');
          } else if (/^(event|src|tgt|dst|url|agent|endpoint|registry|task|cmdScript|osSrc|module|site|account)\.\w/.test(w)) {
            tokens.push('<span class="hl-fd">' + esc(w) + '</span>');
          } else if (/^\|\s*(columns|group|sort|limit|count)/.test(w)) {
            tokens.push('<span class="hl-kw">' + esc(w) + '</span>');
          } else {
            // Check for pipe keywords at start
            const trimmed = w.trim();
            if (trimmed === "|") {
              tokens.push(esc(w));
            } else if (/^(columns|group|sort|limit)$/.test(trimmed)) {
              tokens.push('<span class="hl-kw">' + esc(w) + '</span>');
            } else {
              tokens.push(esc(w));
            }
          }
        }
      }
    }
    return tokens.join("");
  }).join("\n");
}
